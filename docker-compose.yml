version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: splitwise_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: splitwise
      MYSQL_USER: ayush
      MYSQL_PASSWORD: ayush123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Mounts your schema file so it automatically runs on first startup
      - ./mysql_local/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
